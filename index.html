<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>基金板块日报 · 归档</title>
<style>
  :root {
    --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;
    --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
    --up:#3fb950;--accent:#58a6ff;--accent2:#d2a8ff;--accent3:#ffa657;
    --yellow:#d29922;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
  .header{background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);border-bottom:1px solid var(--border);padding:28px 20px 20px;text-align:center;}
  .header-logo{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
  .header-title{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
  .header-title span{color:var(--accent);}
  .header-sub{font-size:13px;color:var(--text2);margin-top:6px;}
  .stats-bar{display:flex;justify-content:center;gap:24px;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat-num{font-size:20px;font-weight:700;color:var(--accent);}
  .stat-label{font-size:11px;color:var(--text3);margin-top:1px;}
  .main{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
  .search-wrap{position:relative;margin-bottom:20px;}
  .search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px 10px 38px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--text3);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
  .month-group{margin-bottom:24px;}
  .month-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);padding:0 4px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .month-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;}
  .day-card:hover{border-color:#444c56;}
  .day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:12px;}
  .day-date{font-size:15px;font-weight:700;color:var(--text);flex-shrink:0;}
  .day-weekday{font-size:11px;color:var(--text3);margin-left:6px;}
  .day-sessions{display:flex;gap:8px;flex-wrap:wrap;}
  /* 早盘：橙色 */
  .session-btn.zaoban{background:rgba(255,166,87,0.1);color:var(--accent3);border:1px solid rgba(255,166,87,0.25);display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.15s;}
  .session-btn.zaoban:hover{background:rgba(255,166,87,0.2);border-color:rgba(255,166,87,0.5);}
  /* 午盘：蓝色 */
  .session-btn.wuban{background:rgba(88,166,255,0.1);color:var(--accent);border:1px solid rgba(88,166,255,0.25);display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.15s;}
  .session-btn.wuban:hover{background:rgba(88,166,255,0.2);border-color:rgba(88,166,255,0.5);}
  /* 缺失状态 */
  .session-btn.missing{background:var(--bg3);color:var(--text3);border:1px solid var(--border);display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;cursor:default;opacity:0.5;}
  .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .dot-zaoban{background:var(--accent3);}
  .dot-wuban{background:var(--accent);}
  .dot-missing{background:var(--text3);}
  .latest-badge{display:inline-block;padding:2px 7px;background:rgba(63,185,80,0.15);color:var(--up);border:1px solid rgba(63,185,80,0.3);border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;vertical-align:middle;margin-left:6px;}
  .empty{text-align:center;padding:60px 20px;color:var(--text3);}
  .empty-icon{font-size:36px;margin-bottom:12px;}
  .footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);}
  .loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;}

  /* 图例说明 */
  .legend{display:flex;gap:16px;justify-content:center;padding:10px 20px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
  .legend-dot{width:8px;height:8px;border-radius:50%;}

  @media(max-width:480px){
    .header-title{font-size:20px;}
    .day-date{font-size:14px;}
    .stats-bar{gap:16px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Steven · A股研究</div>
  <div class="header-title">基金板块<span>日报</span>归档</div>
  <div class="header-sub">每日早盘 13:10 · 午盘 18:30 更新</div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-days">—</div><div class="stat-label">交易日</div></div>
  <div class="stat"><div class="stat-num" id="stat-reports">—</div><div class="stat-label">报告总数</div></div>
  <div class="stat"><div class="stat-num" id="stat-latest">—</div><div class="stat-label">最新更新</div></div>
</div>

<div class="main">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>早盘（盘中/午收）</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>午盘（收盘复盘）</div>
  </div>

  <div class="search-wrap" style="margin-top:12px;">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="搜索日期，如 2026-05-21 或 05-21" id="search-input" oninput="filterReports()">
  </div>
  <div id="report-list"><div class="loading">加载中…</div></div>
</div>

<div class="footer">由 Claude 生成 · 仅供个人投资参考，不构成投资建议</div>

<script>
const WEEKDAYS=['日','一','二','三','四','五','六'];
function getWeekday(d){return '周'+WEEKDAYS[new Date(d).getDay()];}
function groupByMonth(reports){
  const g={};
  reports.forEach(r=>{const m=r.date.slice(0,7);if(!g[m])g[m]=[];g[m].push(r);});
  return g;
}
function formatMonth(m){const[y,mo]=m.split('-');return `${y}年${parseInt(mo)}月`;}

let allReports=[];

async function loadManifest(){
  try{
    const res=await fetch('manifest.json?t='+Date.now());
    const data=await res.json();
    allReports=data.reports.sort((a,b)=>b.date.localeCompare(a.date));
    renderStats();
    renderList(allReports);
  }catch(e){
    document.getElementById('report-list').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div>无法加载报告索引</div></div>';
  }
}

function renderStats(){
  let total=0;
  allReports.forEach(r=>total+=r.sessions.length);
  document.getElementById('stat-days').textContent=allReports.length;
  document.getElementById('stat-reports').textContent=total;
  document.getElementById('stat-latest').textContent=allReports[0]?.date.slice(5)||'—';
}

function renderList(reports){
  const container=document.getElementById('report-list');
  if(!reports.length){
    container.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>没有找到匹配的报告</div></div>';
    return;
  }
  const groups=groupByMonth(reports);
  const sortedMonths=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let html='';
  sortedMonths.forEach(month=>{
    html+=`<div class="month-group"><div class="month-label">${formatMonth(month)}</div>`;
    groups[month].forEach((r,idx)=>{
      const isLatest=idx===0&&month===sortedMonths[0];
      const zaoban=r.sessions.find(s=>s.type==='早盘');
      const wuban=r.sessions.find(s=>s.type==='午盘');

      html+=`<div class="day-card"><div class="day-header">
        <div>
          <span class="day-date">${r.date}</span>
          <span class="day-weekday">${getWeekday(r.date)}</span>
          ${isLatest?'<span class="latest-badge">最新</span>':''}
        </div>
        <div class="day-sessions">`;

      if(zaoban){
        html+=`<a class="session-btn zaoban" href="${zaoban.file}" target="_blank"><span class="dot dot-zaoban"></span>早盘</a>`;
      }else{
        html+=`<span class="session-btn missing"><span class="dot dot-missing"></span>早盘</span>`;
      }

      if(wuban){
        html+=`<a class="session-btn wuban" href="${wuban.file}" target="_blank"><span class="dot dot-wuban"></span>午盘</a>`;
      }else{
        html+=`<span class="session-btn missing"><span class="dot dot-missing"></span>午盘</span>`;
      }

      html+=`</div></div></div>`;
    });
    html+=`</div>`;
  });
  container.innerHTML=html;
}

function filterReports(){
  const q=document.getElementById('search-input').value.trim();
  renderList(q?allReports.filter(r=>r.date.includes(q)):allReports);
}

loadManifest();
</script>
</body>
</html>
