<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>基金板块日报 · 归档</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --up: #3fb950;
    --down: #f85149;
    --accent: #58a6ff;
    --accent2: #d2a8ff;
    --yellow: #d29922;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 20px 20px;
    text-align: center;
  }
  .header-logo {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .header-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .header-title span { color: var(--accent); }
  .header-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 14px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* Main */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 15px;
    pointer-events: none;
  }

  /* Month group */
  .month-group { margin-bottom: 24px; }
  .month-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 4px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .month-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Day card */
  .day-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .day-card:hover { border-color: #444c56; }
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    gap: 12px;
  }
  .day-date {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .day-weekday {
    font-size: 11px;
    color: var(--text3);
    margin-left: 6px;
    font-weight: 400;
  }
  .day-sessions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .session-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .session-btn.morning {
    background: rgba(88,166,255,0.1);
    color: var(--accent);
    border-color: rgba(88,166,255,0.25);
  }
  .session-btn.morning:hover {
    background: rgba(88,166,255,0.2);
    border-color: rgba(88,166,255,0.5);
  }
  .session-btn.evening {
    background: rgba(210,168,255,0.1);
    color: var(--accent2);
    border-color: rgba(210,168,255,0.25);
  }
  .session-btn.evening:hover {
    background: rgba(210,168,255,0.2);
    border-color: rgba(210,168,255,0.5);
  }
  .session-btn.missing {
    background: var(--bg3);
    color: var(--text3);
    border-color: var(--border);
    cursor: default;
    opacity: 0.5;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-morning { background: var(--accent); }
  .dot-evening { background: var(--accent2); }
  .dot-missing { background: var(--text3); }

  /* Latest badge */
  .latest-badge {
    display: inline-block;
    padding: 2px 7px;
    background: rgba(63,185,80,0.15);
    color: var(--up);
    border: 1px solid rgba(63,185,80,0.3);
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    vertical-align: middle;
    margin-left: 6px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 13px;
  }

  @media (max-width: 480px) {
    .header-title { font-size: 20px; }
    .day-date { font-size: 14px; }
    .stats-bar { gap: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Steven · A股研究</div>
  <div class="header-title">基金板块<span>日报</span>归档</div>
  <div class="header-sub">每日午盘 12:30 · 晚间 18:30 更新</div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="stat-days">—</div>
    <div class="stat-label">交易日</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-reports">—</div>
    <div class="stat-label">报告总数</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-latest">—</div>
    <div class="stat-label">最新更新</div>
  </div>
</div>

<div class="main">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="搜索日期，如 2026-05-21 或 05-21" id="search-input" oninput="filterReports()">
  </div>
  <div id="report-list"><div class="loading">加载中…</div></div>
</div>

<div class="footer">
  由 Claude 生成 · 仅供个人投资参考，不构成投资建议
</div>

<script>
const WEEKDAYS = ['日','一','二','三','四','五','六'];

function getWeekday(dateStr) {
  const d = new Date(dateStr);
  return '周' + WEEKDAYS[d.getDay()];
}

function groupByMonth(reports) {
  const groups = {};
  reports.forEach(r => {
    const month = r.date.slice(0, 7); // "2026-05"
    if (!groups[month]) groups[month] = [];
    groups[month].push(r);
  });
  return groups;
}

function formatMonth(m) {
  const [y, mo] = m.split('-');
  return `${y}年${parseInt(mo)}月`;
}

let allReports = [];

async function loadManifest() {
  try {
    const res = await fetch('manifest.json?t=' + Date.now());
    const data = await res.json();
    allReports = data.reports.sort((a, b) => b.date.localeCompare(a.date));
    renderStats();
    renderList(allReports);
  } catch(e) {
    document.getElementById('report-list').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">无法加载报告索引</div></div>';
  }
}

function renderStats() {
  const totalDays = allReports.length;
  let totalReports = 0;
  allReports.forEach(r => totalReports += r.sessions.length);
  const latest = allReports[0]?.date || '—';

  document.getElementById('stat-days').textContent = totalDays;
  document.getElementById('stat-reports').textContent = totalReports;
  document.getElementById('stat-latest').textContent = latest.slice(5); // "05-21"
}

function renderList(reports) {
  const container = document.getElementById('report-list');
  if (!reports.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">没有找到匹配的报告</div></div>';
    return;
  }

  const groups = groupByMonth(reports);
  let html = '';

  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(month => {
    html += `<div class="month-group">`;
    html += `<div class="month-label">${formatMonth(month)}</div>`;

    groups[month].forEach((r, idx) => {
      const isLatest = idx === 0 && month === Object.keys(groups).sort((a,b) => b.localeCompare(a))[0];
      const hasMorning = r.sessions.find(s => s.type === '午盘');
      const hasEvening = r.sessions.find(s => s.type === '晚间');

      html += `<div class="day-card">
        <div class="day-header">
          <div>
            <span class="day-date">${r.date}</span>
            <span class="day-weekday">${getWeekday(r.date)}</span>
            ${isLatest ? '<span class="latest-badge">最新</span>' : ''}
          </div>
          <div class="day-sessions">`;

      if (hasMorning) {
        html += `<a class="session-btn morning" href="${hasMorning.file}" target="_blank">
          <span class="dot dot-morning"></span>午盘
        </a>`;
      } else {
        html += `<span class="session-btn missing"><span class="dot dot-missing"></span>午盘</span>`;
      }

      if (hasEvening) {
        html += `<a class="session-btn evening" href="${hasEvening.file}" target="_blank">
          <span class="dot dot-evening"></span>晚间
        </a>`;
      } else {
        html += `<span class="session-btn missing"><span class="dot dot-missing"></span>晚间</span>`;
      }

      html += `</div></div></div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

function filterReports() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) {
    renderList(allReports);
    return;
  }
  const filtered = allReports.filter(r => r.date.includes(q));
  renderList(filtered);
}

loadManifest();
</script>
</body>
</html>
